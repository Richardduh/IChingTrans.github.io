<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>易經大衍占卜 - 傳統蓍草占卜法</title>
    
    <!-- 引入易經文本數據庫 -->
    <script src="yijing-text.js"></script>
    
    <!-- 引入html2canvas用於截圖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        /* 主要樣式 */
        /* Google AdSense 保留欄位 */
        .adsense-placeholder {
            display: none; /* 目前隱藏，申請後改為 block */
            background: rgba(255, 255, 255, 0.05);
            border: 2px dashed rgba(240, 165, 0, 0.3);
            border-radius: 10px;
            padding: 20px;
            margin: 20px 0;
            text-align: center;
            min-height: 100px;
        }
        
        .adsense-placeholder-text {
            color: #808080;
            font-size: 0.9em;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            width: 100%;
        }

        h1 {
            text-align: center;
            font-size: 2.5em;
            margin: 20px 0;
            color: #f0a500;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        /* 畫面切換 */
        .screen {
            display: none;
            animation: fadeIn 0.5s ease;
        }

        .screen.active {
            display: block;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 畫面1: 問題輸入 */
        .question-screen {
            max-width: 700px;
            margin: 50px auto;
        }

        .question-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 40px;
            border: 1px solid rgba(240, 165, 0, 0.3);
        }

        .question-title {
            font-size: 1.8em;
            color: #f0a500;
            margin-bottom: 30px;
            text-align: center;
        }

        .question-subtitle {
            font-size: 1.1em;
            color: #b0b0b0;
            margin-bottom: 25px;
            text-align: center;
            line-height: 1.6;
        }

        .question-input {
            width: 100%;
            padding: 20px;
            font-size: 1.2em;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(240, 165, 0, 0.5);
            border-radius: 10px;
            color: #e0e0e0;
            outline: none;
            transition: all 0.3s ease;
            margin-bottom: 30px;
        }

        .question-input:focus {
            border-color: #f0a500;
            box-shadow: 0 0 15px rgba(240, 165, 0, 0.3);
        }

        .button {
            display: block;
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #f0a500, #e09200);
            color: #1a1a2e;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(240, 165, 0, 0.4);
            transition: all 0.3s ease;
        }

        .button:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(240, 165, 0, 0.6);
        }

        .button:active {
            transform: translateY(0);
        }

        .button:disabled {
            background: #555;
            cursor: not-allowed;
            box-shadow: none;
            opacity: 0.5;
        }

        /* 畫面2: 占卜進行中 */
        .divination-screen {
            max-width: 1000px;
            margin: 0 auto;
        }

        .question-display {
            font-size: 1.5em;
            color: #f0a500;
            text-align: center;
            padding: 20px;
            background: rgba(240, 165, 0, 0.1);
            border-radius: 10px;
            border: 2px solid #f0a500;
            margin-bottom: 20px;
        }

        .info-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(240, 165, 0, 0.3);
        }

        .status {
            font-size: 1.2em;
            text-align: center;
            margin-bottom: 10px;
            color: #f0a500;
        }

        .instruction {
            text-align: center;
            font-size: 1em;
            color: #b0b0b0;
        }

        .error-message {
            color: #ff6b6b;
            background: rgba(255, 107, 107, 0.1);
            border: 2px solid #ff6b6b;
            border-radius: 10px;
            padding: 15px;
            margin: 15px 0;
            text-align: center;
            font-size: 1.1em;
            animation: shake 0.5s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .grid-layout {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px auto;
        }

        .grid-row {
            display: flex;
            gap: 15px;
            justify-content: center;
        }

        .grid-cell {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(240, 165, 0, 0.3);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 15px;
            position: relative;
            min-height: 120px;
            transition: all 0.3s ease;
        }

        .grid-cell.small {
            width: 150px;
        }

        .grid-cell.large {
            flex: 1;
            max-width: 600px;
        }

        .grid-cell.active {
            background: rgba(240, 165, 0, 0.1);
            border-color: #f0a500;
            box-shadow: 0 0 20px rgba(240, 165, 0, 0.3);
        }

        .grid-cell-label {
            position: absolute;
            top: 5px;
            left: 5px;
            font-size: 0.7em;
            color: #808080;
        }

        .sticks-area {
            display: flex;
            flex-wrap: wrap;
            gap: 2px;
            justify-content: center;
            align-items: center;
            width: 100%;
            height: 100%;
        }

        .stick {
            width: 3px;
            height: 30px;
            background: linear-gradient(to bottom, #8B4513, #D2691E);
            border-radius: 2px;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }

        .stick.horizontal {
            width: 30px;
            height: 3px;
            transform: rotate(45deg);
        }

        .stick.moving {
            animation: moveStick 0.8s ease;
        }

        @keyframes moveStick {
            0% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
            50% {
                transform: scale(1.3) translateY(-20px);
                opacity: 0.7;
            }
            100% {
                transform: scale(1) translateY(0);
                opacity: 1;
            }
        }

        .stick-count {
            position: absolute;
            bottom: 5px;
            right: 5px;
            font-size: 1.2em;
            font-weight: bold;
            color: #f0a500;
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 8px;
            border-radius: 5px;
        }

        .dividing-interface {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }

        .piles-display {
            display: flex;
            width: 100%;
            justify-content: space-around;
            align-items: flex-end;
            min-height: 150px;
        }

        .pile {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .pile-label {
            font-size: 1em;
            color: #f0a500;
            margin-bottom: 10px;
        }

        .pile-sticks {
            display: flex;
            flex-wrap: nowrap;
            gap: 2px;
            justify-content: center;
            overflow-x: auto;
            max-width: 100%;
        }

        .slider {
            width: 100%;
            height: 8px;
            border-radius: 5px;
            background: rgba(255, 255, 255, 0.2);
            outline: none;
            -webkit-appearance: none;
        }

        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0a500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(240, 165, 0, 0.5);
            transition: all 0.2s ease;
        }

        .slider::-webkit-slider-thumb:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(240, 165, 0, 0.7);
        }

        .slider::-moz-range-thumb {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: #f0a500;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(240, 165, 0, 0.5);
            border: none;
            transition: all 0.2s ease;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin: 20px 0;
        }

        .button.secondary {
            background: rgba(255, 255, 255, 0.1);
            color: #e0e0e0;
            border: 2px solid rgba(240, 165, 0, 0.5);
        }

        .button.secondary:hover {
            background: rgba(255, 255, 255, 0.15);
            border-color: #f0a500;
        }

        /* 畫面3: 占卜結果 */
        .result-screen {
            max-width: 800px;
            margin: 0 auto;
        }

        .results-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            border: 1px solid rgba(240, 165, 0, 0.3);
            margin-bottom: 30px;
        }

        .results-title {
            text-align: center;
            font-size: 1.8em;
            color: #f0a500;
            margin-bottom: 25px;
        }

        .results-grid {
            display: flex;
            flex-direction: column-reverse;
            gap: 10px;
            max-width: 400px;
            margin: 0 auto 30px;
        }

        .result-item {
            background: rgba(240, 165, 0, 0.1);
            border: 2px solid #f0a500;
            border-radius: 10px;
            padding: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            background: rgba(240, 165, 0, 0.15);
            transform: translateX(5px);
        }

        .result-label {
            font-size: 1.1em;
            color: #e0e0e0;
        }

        .result-number {
            font-size: 2.5em;
            font-weight: bold;
            color: #f0a500;
        }

        /* 畫面4&5: 問卷頁面 */
        .survey-screen {
            max-width: 900px;
            margin: 0 auto;
        }

        .survey-intro {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 25px;
            border: 1px solid rgba(240, 165, 0, 0.3);
        }

        .survey-intro h2 {
            color: #f0a500;
            font-size: 1.6em;
            margin-bottom: 20px;
            text-align: center;
        }

        .survey-intro p {
            font-size: 1.1em;
            line-height: 1.8;
            color: #c0c0c0;
            margin-bottom: 15px;
        }

        .survey-options {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        .survey-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(240, 165, 0, 0.3);
            min-height: 600px;
        }

        .survey-container iframe {
            width: 100%;
            min-height: 800px;
            border: none;
            border-radius: 10px;
        }

        .navigation-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 25px;
        }

        /* 載入動畫 */
        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            width: 50px;
            height: 50px;
            border: 4px solid rgba(240, 165, 0, 0.2);
            border-top: 4px solid #f0a500;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-text {
            color: #f0a500;
            font-size: 1.2em;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>☯ 易經大衍占卜 ☯</h1>

        <!-- ==================== 畫面1: 問題輸入 ==================== -->
        <div class="screen active" id="screen1">
            <div class="question-screen">
                <!-- Google AdSense 保留欄位 -->
                <div class="adsense-placeholder">
                    <div class="adsense-placeholder-text">Google AdSense 廣告位置</div>
                    <!-- 申請AdSense後，將廣告代碼放在這裡 -->
                </div>

                <div class="question-panel">
                    <h2 class="question-title">誠心問卜</h2>
                    <p class="question-subtitle">請靜心思考您的問題，以誠摯的心態進行占卜。<br>問題越具體明確，占卜結果越有參考價值。</p>
                    <input type="text" class="question-input" id="questionInput" placeholder="例如：今年事業發展如何？我該如何改善與伴侶的關係？">
                    <button class="button" id="startButton">開始占卜</button>
                </div>
            </div>
        </div>

        <!-- ==================== 畫面2: 占卜進行中 ==================== -->
        <div class="screen" id="screen2">
            <div class="divination-screen">
                <div class="question-display" id="questionDisplay"></div>

                <div class="info-panel">
                    <div class="status" id="status">準備中...</div>
                    <div class="instruction" id="instruction">系統準備中</div>
                </div>

                <!-- 即時結果顯示 -->
                <div class="results-panel" id="liveResults" style="display: none; margin-bottom: 20px;">
                    <h3 style="text-align: center; color: #f0a500; font-size: 1.3em; margin-bottom: 15px;">目前結果</h3>
                    <div class="results-grid" id="liveResultsGrid"></div>
                </div>

                <div id="errorMessage" style="display: none;"></div>

                <div class="grid-layout">
                    <!-- 第一排 -->
                    <div class="grid-row">
                        <div class="grid-cell small" id="cell-top-left">
                            <span class="grid-cell-label">左上</span>
                            <div class="sticks-area" id="sticks-top-left"></div>
                        </div>
                        <div class="grid-cell small" id="cell-top-center">
                            <span class="grid-cell-label">中上</span>
                            <div class="sticks-area" id="sticks-top-center"></div>
                        </div>
                        <div class="grid-cell small" id="cell-top-right">
                            <span class="grid-cell-label">右上</span>
                            <div class="sticks-area" id="sticks-top-right"></div>
                        </div>
                    </div>

                    <!-- 第二排 -->
                    <div class="grid-row">
                        <div class="grid-cell large" id="cell-middle">
                            <span class="grid-cell-label">操作區</span>
                            <div id="middleContent"></div>
                        </div>
                    </div>

                    <!-- 第三排 -->
                    <div class="grid-row">
                        <div class="grid-cell small" id="cell-bottom-left">
                            <span class="grid-cell-label">左下</span>
                            <div class="sticks-area" id="sticks-bottom-left"></div>
                        </div>
                        <div class="grid-cell small" id="cell-bottom-center">
                            <span class="grid-cell-label">中下</span>
                            <div class="sticks-area" id="sticks-bottom-center"></div>
                        </div>
                        <div class="grid-cell small" id="cell-bottom-right">
                            <span class="grid-cell-label">右下</span>
                            <div class="sticks-area" id="sticks-bottom-right"></div>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button class="button" id="continueButton" style="display: none;">繼續下一爻</button>
                    <button class="button secondary" id="resetButton">重新占卜</button>
                </div>
            </div>
        </div>

        <!-- ==================== 畫面3: 占卜結果 ==================== -->
        <div class="screen" id="screen3">
            <div class="result-screen">
                <div class="question-display" id="resultQuestionDisplay"></div>

                <!-- Google AdSense 保留欄位 -->
                <div class="adsense-placeholder">
                    <div class="adsense-placeholder-text">Google AdSense 廣告位置</div>
                    <!-- 申請AdSense後，將廣告代碼放在這裡 -->
                </div>

                <div class="results-panel">
                    <h2 class="results-title">占卜結果</h2>
                    <div class="results-grid" id="resultsGrid"></div>
                    <div class="navigation-buttons">
                        <button class="button" id="toSurveyButton">查看解讀與填寫問卷</button>
                        <button class="button secondary" id="resetFromResultButton">重新占卜</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- ==================== 畫面4: 占卜結果問卷 ==================== -->
        <div class="screen" id="screen4">
            <div class="survey-screen">
                <div class="question-display" id="surveyQuestionDisplay"></div>

                <!-- Google AdSense 保留欄位 -->
                <div class="adsense-placeholder">
                    <div class="adsense-placeholder-text">Google AdSense 廣告位置</div>
                    <!-- 申請AdSense後，將廣告代碼放在這裡 -->
                </div>

                <!-- 易經原文顯示區 -->
                <div class="survey-intro" style="margin-bottom: 30px;">
                    <h2 style="color: #f0a500; margin-bottom: 20px;">易經解讀</h2>
                    
                    <!-- 本卦顯示區域 -->
                    <div style="display: flex; gap: 30px; margin-bottom: 30px; flex-wrap: wrap; justify-content: center;">
                        <!-- 本卦 -->
                        <div style="flex: 1; min-width: 250px; max-width: 400px;">
                            <h3 style="color: #f0a500; text-align: center; margin-bottom: 15px;">卦象</h3>
                            <div style="background: rgba(0, 0, 0, 0.3); border-radius: 10px; padding: 20px; border: 1px solid rgba(240, 165, 0, 0.3);">
                                <div id="benguaCanvas" style="display: flex; justify-content: center; margin-bottom: 15px;"></div>
                                <div id="benguaName" style="text-align: center; font-size: 1.3em; color: #f0a500; font-weight: bold;"></div>
                                <div id="benguaChanging" style="text-align: center; font-size: 1em; color: #ff9500; margin-top: 10px;"></div>
                            </div>
                        </div>
                    </div>
                    
                    <!-- 原文 -->
                    <div id="yijingTextDisplay" style="
                        background: rgba(0, 0, 0, 0.3);
                        padding: 25px;
                        border-radius: 10px;
                        white-space: pre-wrap;
                        line-height: 2;
                        font-size: 1.05em;
                        border: 1px solid rgba(240, 165, 0, 0.3);
                    "></div>
                </div>

                <div class="navigation-buttons">
                    <button class="button secondary" id="backToResult">返回結果頁</button>
                    <button class="button" id="saveAsImageBtn" onclick="saveResultAsImage()" style="background: linear-gradient(135deg, #667eea, #764ba2);">
                        📷 保存為圖片
                    </button>
                    <button class="button" id="toFeedbackSurvey">填寫使用心得問卷</button>
                </div>
            </div>
        </div>

        <!-- ==================== 畫面5: 使用心得問卷 ==================== -->
        <div class="screen" id="screen5">
            <div class="survey-screen">
                <div class="survey-intro">
                    <h2>使用心得問卷</h2>
                    <p>感謝您使用易經大衍占卜系統！</p>
                    <p>請分享您的使用體驗，幫助我們改進服務品質。</p>
                </div>

                <div class="survey-container">
                    <!-- 
                    ==================== Google 表單嵌入位置 ====================
                    請將您的「使用心得問卷」Google 表單嵌入代碼放在這裡
                    
                    範例：
                    <iframe src="https://docs.google.com/forms/d/e/YOUR_FEEDBACK_FORM_ID/viewform?embedded=true" 
                            width="100%" height="1000" frameborder="0" marginheight="0" marginwidth="0">
                        載入中…
                    </iframe>
                    ==================== Google 表單嵌入位置 ====================
                    -->
                    
                    <!-- 示意用的佔位內容 -->
                    <div style="padding: 40px; text-align: center; color: #888;">
                        <p style="font-size: 1.2em; margin-bottom: 15px;">📝 使用心得問卷將顯示於此</p>
                        <p>請在上方註解區域插入您的 Google 表單嵌入代碼</p>
                    </div>
                </div>

                <div class="navigation-buttons">
                    <button class="button secondary" id="backToResultFromFeedback">返回結果頁</button>
                    <button class="button" id="finishButton">完成</button>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ==================== 卦名字典 ====================
        const guaDict = {
            '111111': '乾卦乾為天䷀',
            '000111': '否卦天地否䷋',
            '110111': '履卦天澤履䷉',
            '001111': '遯卦天山遯䷠',
            '101111': '同人卦天火同人䷌',
            '010111': '訟卦天水訟䷅',
            '100111': '无妄卦天雷无妄䷘',
            '011111': '姤卦天風姤䷫',
            
            '111000': '泰卦地天泰䷊',
            '000000': '坤卦坤為地䷁',
            '110000': '臨卦地澤臨䷒',
            '001000': '謙卦地山謙䷎',
            '101000': '明夷卦地火明夷䷣',
            '010000': '師卦地水師䷆',
            '100000': '復卦地雷復䷗',
            '011000': '升卦地風升䷭',

        // ==================== 易經原文處理 ====================
        // 從外部yijing-text.js文件獲取易經原文
        function getYijingText(guaName) {
            // 檢查外部文件是否成功載入
            if (typeof YIJING_TEXT === 'undefined') {
                return {
                    text: `${guaName}\n\n錯誤：易經文本數據庫未能正確載入。\n請確認 yijing-text.js 文件與此HTML文件在同一目錄下。`,
                    image: null
                };
            }
            
            // 從數據庫中獲取對應的卦辭
            if (YIJING_TEXT[guaName]) {
                return {
                    text: YIJING_TEXT[guaName].text || YIJING_TEXT[guaName],
                    image: YIJING_TEXT[guaName].image || null
                };
            } else {
                return {
                    text: `${guaName}\n\n此卦的詳細原文尚未添加到數據庫中。\n請在 yijing-text.js 文件中補充此卦的內容。`,
                    image: null
                };
            }
        }

        // 計算變卦
        function calculateBianGua(binaryStr, changingYaoIndices) {
            if (changingYaoIndices.length === 0) {
                return null; // 無變爻,無變卦
            }
            
            // 將本卦的二進制字符串轉換為陣列
            let bianBinary = binaryStr.split('');
            
            // 變爻:0變1,1變0
            changingYaoIndices.forEach(index => {
                bianBinary[index] = bianBinary[index] === '1' ? '0' : '1';
            });
            
            const bianBinaryStr = bianBinary.join('');
            
            // 查找變卦名稱
            if (typeof GUA_BINARY !== 'undefined') {
                for (const [guaName, binary] of Object.entries(GUA_BINARY)) {
                    if (binary === bianBinaryStr) {
                        return guaName;
                    }
                }
            }
            
            return null;
        }

        // 爻的名稱映射
        const yaoNames = ['初爻', '二爻', '三爻', '四爻', '五爻', '上爻'];

        // 將數字轉換為0/1 (6,8->0; 7,9->1)
        function numberToYao(num) {
            return (num === 7 || num === 9) ? '1' : '0';
        }

        // 判斷是否為變爻 (6或9)
        function isChangingYao(num) {
            return num === 6 || num === 9;
        }

        // 計算卦名和變爻
        function calculateGua(results) {
            // 將六個數字轉換為二進制字符串
            const binaryStr = results.map(numberToYao).join('');
            
            // 查找卦名
            const guaName = guaDict[binaryStr] || '未知卦';
            
            // 找出變爻位置
            const changingYaos = [];
            results.forEach((num, index) => {
                if (isChangingYao(num)) {
                    changingYaos.push(yaoNames[index]);
                }
            });
            
            return {
                guaName: guaName,
                changingYaos: changingYaos,
                binaryStr: binaryStr
            };
        }

        // ==================== 占卜邏輯 ====================
        function renderSticks(cellId, count, horizontal = false) {

            cell.innerHTML = '';
            
            for (let i = 0; i < count; i++) {

            if (count > 0) {

                countDisplay.className = 'stick-count';
                countDisplay.textContent = count;
                parentCell.appendChild(countDisplay);
            }
        }

        function clearCell(cellId) {

        function clearBottomRow() {

            clearCell('bottom-center');

        function createDividingInterface() {
            middleContent.innerHTML = `
                <div class="dividing-interface">
                    <div class="piles-display">
                        <div class="pile">
                            <div class="pile-label">左堆</div>

                    <button class="button" id="confirmButton">確認分配</button>
                </div>
            `;

            const slider = document.getElementById('stickSlider');
            const leftPileSticks = document.getElementById('leftPileSticks');
            const rightPileSticks = document.getElementById('rightPileSticks');
            const confirmButton = document.getElementById('confirmButton');

            slider.addEventListener('input', function() {
                const leftValue = parseInt(this.value);
                const rightValue = gameState.totalSticks - leftValue;
                
                renderPileSticks(leftPileSticks, leftValue);
                renderPileSticks(rightPileSticks, rightValue);
            });

            const initialLeft = parseInt(slider.value);
            renderPileSticks(leftPileSticks, initialLeft);
            renderPileSticks(rightPileSticks, gameState.totalSticks - initialLeft);

            confirmButton.addEventListener('click', () => confirmDivision(slider));
        }

        function renderPileSticks(container, count) {
            container.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const stick = document.createElement('div');
                stick.className = 'stick';
                container.appendChild(stick);
            }

        function showProcessingSticks(count) {
            middleContent.innerHTML = '';
            const sticksArea = document.createElement('div');
            sticksArea.className = 'sticks-area';
            
            for (let i = 0; i < count; i++) {
                const stick = document.createElement('div');

                sticksArea.appendChild(stick);

            middleContent.appendChild(sticksArea);

        async function initializeDivination() {
            gameState = {
                question: gameState.question,
                currentYao: 0,
                currentRound: 0,
                totalSticks: 49,
                results: [],
                phase: 'initializing'
            };

            Object.keys(cells).forEach(clearCell);
            middleContent.innerHTML = '';

            status.textContent = `準備大衍之數...`;
            instruction.textContent = '大衍之數五十，其用四十有九';

            // 動畫：顯示50根木棒
            showProcessingSticks(50);
            highlightCell(document.getElementById('cell-middle'));
            await sleep(1500);

            // 動畫：取出1根放到中上
            status.textContent = '取出一根放置於中上位置';
            instruction.textContent = '虛一不用';
            
            // 添加移動動畫
            const sticks = middleContent.querySelectorAll('.stick');
            if (sticks.length > 0) {
                sticks[0].classList.add('moving');
            }
            
            await sleep(800);
            
            renderSticks('top-center', 1);
            showProcessingSticks(49);
            await sleep(1000);

            gameState.totalSticks = 49;
            gameState.phase = 'idle';

            status.textContent = `${yaoNames[gameState.currentYao]} - 第 ${gameState.currentRound + 1} 輪`;
            instruction.textContent = '請將木棒分成兩堆';

            startNextRound();
        }

        function startNextRound() {
            clearBottomRow();
            middleContent.innerHTML = '';

            showProcessingSticks(gameState.totalSticks);
            highlightCell(document.getElementById('cell-middle'));

            setTimeout(() => {
                createDividingInterface();
                gameState.phase = 'dividing';
            }, 500);
        }

        async function confirmDivision(slider) {
            if (gameState.phase !== 'dividing') return;

            const leftValue = parseInt(slider.value);
            const rightValue = gameState.totalSticks - leftValue;

            if (leftValue < 4 || rightValue < 4) {
                showError('每一堆至少要有4根木棒！請重新分配。');
                return;
            }

            gameState.phase = 'processing';

            let a = leftValue;
            let b = rightValue;

            middleContent.innerHTML = '';
            await sleep(300);

            // 步驟1: 左堆取1根放到左下
            a = a - 1;
            renderSticks('bottom-left', 1);
            await sleep(800);

            // 步驟2: 左堆除4取餘數，放到中下
            const leftRemainder = a % 4 === 0 ? 4 : a % 4;
            a = a - leftRemainder;
            renderSticks('bottom-center', leftRemainder);
            await sleep(800);

            // 步驟3: 右堆除4取餘數，放到右下
            const rightRemainder = b % 4 === 0 ? 4 : b % 4;
            b = b - rightRemainder;
            renderSticks('bottom-right', rightRemainder);
            await sleep(800);

            // 步驟4: 移到左上角橫放
            const totalBottom = 1 + leftRemainder + rightRemainder;
            clearBottomRow();
            const currentTopLeft = cells['top-left'].querySelectorAll('.stick').length;
            clearCell('top-left');
            renderSticks('top-left', currentTopLeft + totalBottom, true);
            await sleep(800);

            // 合併剩餘木棒
            gameState.totalSticks = a + b;
            showProcessingSticks(gameState.totalSticks);
            await sleep(500);

            gameState.currentRound++;
            
            if (gameState.currentRound >= 3) {
                // 完成一爻
                const yaoValue = gameState.totalSticks / 4;
                gameState.results.push(yaoValue);
                
                // 更新即時顯示
                updateLiveResults();
                
                status.textContent = `${yaoNames[gameState.currentYao]}完成！得到數字：${yaoValue}`;
                instruction.textContent = gameState.currentYao < 5 ? '點擊「繼續」進行下一爻' : '占卜完成！';
                
                gameState.currentYao++;
                gameState.currentRound = 0;
                gameState.totalSticks = 49;

                if (gameState.currentYao >= 6) {
                    finishDivination();
                } else {
                    document.getElementById('continueButton').style.display = 'inline-block';
                    middleContent.innerHTML = '';
                    highlightCell(null);
                }
            } else {
                status.textContent = `${yaoNames[gameState.currentYao]} - 第 ${gameState.currentRound + 1} 輪`;
                instruction.textContent = '請將木棒分成兩堆';
                await sleep(500);
                startNextRound();
            }
        }

            const button = document.getElementById('saveAsImageBtn');
            
            if (!button) {
                alert('找不到按鈕元素');
                return;
            }
            
            const originalText = button.textContent;
            button.textContent = '📸 生成中...';
            button.disabled = true;

            try {
                // 檢查是否載入html2canvas
                if (typeof html2canvas === 'undefined') {
                    throw new Error('html2canvas 庫未載入');
                }

                // 要截圖的區域
                const screen4 = document.getElementById('screen4');
                if (!screen4) {
                    throw new Error('找不到screen4元素');
                }

                const surveyScreen = screen4.querySelector('.survey-screen');
                if (!surveyScreen) {
                    throw new Error('找不到survey-screen元素');
                }

                // 獲取按鈕區域
                const navButtons = screen4.querySelector('.navigation-buttons');
                const adsPlaceholders = screen4.querySelectorAll('.adsense-placeholder');
                
                // 臨時隱藏不需要的元素
                if (navButtons) navButtons.style.display = 'none';
                adsPlaceholders.forEach(el => el.style.display = 'none');

                // 等待圖片載入
                const images = surveyScreen.querySelectorAll('img');
                await Promise.all(Array.from(images).map(img => {
                    if (img.complete) return Promise.resolve();
                    return new Promise((resolve, reject) => {
                        img.onload = resolve;
                        img.onerror = () => resolve(); // 即使圖片失敗也繼續
                        setTimeout(resolve, 3000); // 3秒超時
                    });
                }));

                console.log('開始生成canvas...');

                // 生成圖片 - 使用更保守的設定
                const canvas = await html2canvas(surveyScreen, {
                    backgroundColor: '#16213e',
                    scale: 1.5, // 降低到1.5倍避免記憶體問題
                    logging: true, // 開啟日誌以便除錯
                    useCORS: true,
                    allowTaint: true, // 允許汙染的canvas
                    imageTimeout: 15000, // 圖片載入超時15秒
                    removeContainer: true
                });

                console.log('Canvas生成成功');

                // 恢復元素顯示
                if (navButtons) navButtons.style.display = '';
                adsPlaceholders.forEach(el => el.style.display = '');

                // 轉換為圖片
                let imageData;
                try {
                    imageData = canvas.toDataURL('image/png', 0.95);
                } catch (e) {
                    console.error('toDataURL失敗:', e);
                    // 嘗試用較低品質
                    imageData = canvas.toDataURL('image/jpeg', 0.8);
                }

                console.log('圖片數據生成成功,大小:', imageData.length);

                // 下載圖片
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0,19).replace(/[:\-]/g, '');
                link.download = `易經占卜結果_${timestamp}.png`;
                link.href = imageData;
                
                // 觸發下載
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                console.log('下載觸發成功');

                button.textContent = '✅ 保存成功!';
                setTimeout(() => {
                    button.textContent = originalText;
                    button.disabled = false;
                }, 2000);

            } catch (error) {
                console.error('保存失敗,詳細錯誤:', error);
                
                // 恢復元素顯示
                const navButtons = document.querySelector('.navigation-buttons');
                const adsPlaceholders = document.querySelectorAll('.adsense-placeholder');
                if (navButtons) navButtons.style.display = '';
                adsPlaceholders.forEach(el => el.style.display = '');
                
                alert('保存圖片失敗:\n' + error.message + '\n\n請嘗試:\n1. 重新整理頁面\n2. 使用其他瀏覽器(Chrome/Firefox)\n3. 檢查瀏覽器控制台的錯誤訊息');
                
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        // 初始化
        renderSticks('top-center', 1);
    </script>
</body>
</html>
