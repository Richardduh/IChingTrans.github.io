<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>符號學解夢 - 易經智慧</title>
    
    <!-- 引入易經文本數據庫 -->
    <script src="yijing-text.js"></script>
    
    <!-- 引入解夢專用圖片配置 -->
    <script src="dream-images.js"></script>
    
    <!-- 引入html2canvas用於截圖 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Microsoft JhengHei', 'PingFang TC', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: white;
        }

        /* 導航列 */
        .navbar {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 0;
            border-bottom: 1px solid rgba(240, 165, 0, 0.3);
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .nav-container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 30px;
        }

        .nav-brand {
            font-size: 1.8em;
            font-weight: bold;
            background: linear-gradient(135deg, #f0a500, #ff9500);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            padding: 20px 0;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .nav-menu {
            display: flex;
            list-style: none;
            gap: 0;
        }

        .nav-menu li a {
            display: block;
            padding: 20px 25px;
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: all 0.3s ease;
            border-bottom: 3px solid transparent;
        }

        .nav-menu li a:hover {
            color: #f0a500;
            background: rgba(240, 165, 0, 0.1);
            border-bottom-color: #f0a500;
        }

        .nav-menu li a.active {
            color: #f0a500;
            border-bottom-color: #f0a500;
        }

        /* 主容器 */
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 40px 30px;
        }

        /* 畫面切換 */
        .screen {
            display: none;
        }

        .screen.active {
            display: block;
        }

        /* 標題區 */
        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .page-title {
            font-size: 2.5em;
            color: #f0a500;
            margin-bottom: 15px;
        }

        .page-subtitle {
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
        }

        /* 輸入畫面 */
        .input-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(240, 165, 0, 0.3);
            border-radius: 20px;
            padding: 40px;
        }

        .form-label {
            display: block;
            font-size: 1.3em;
            color: #f0a500;
            margin-bottom: 15px;
            font-weight: bold;
        }

        .dream-input {
            width: 100%;
            min-height: 150px;
            padding: 20px;
            font-size: 1.1em;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(240, 165, 0, 0.3);
            border-radius: 15px;
            color: white;
            outline: none;
            resize: vertical;
            font-family: inherit;
            line-height: 1.6;
        }

        .dream-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .dream-input:focus {
            border-color: #f0a500;
            background: rgba(255, 255, 255, 0.15);
        }

        .start-button {
            width: 100%;
            padding: 18px;
            font-size: 1.3em;
            background: linear-gradient(135deg, #f0a500, #ff9500);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .start-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240, 165, 0, 0.5);
        }

        /* 卡片瀏覽畫面 */
        .card-viewer {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 40px;
        }

        .progress-info {
            text-align: center;
            font-size: 1.2em;
            color: rgba(255, 255, 255, 0.7);
        }

        .card-display {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid #f0a500;
            border-radius: 20px;
            padding: 40px;
            min-height: 500px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .card-title {
            font-size: 2em;
            color: #f0a500;
            margin-bottom: 30px;
            text-align: center;
        }

        .card-image {
            max-width: 350px;
            max-height: 400px;
            margin-bottom: 30px;
            border-radius: 10px;
        }

        .card-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .action-button {
            padding: 15px 30px;
            font-size: 1.1em;
            border: 2px solid;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: bold;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-like {
            color: #f0a500;
            border-color: #f0a500;
        }

        .btn-like:hover {
            background: rgba(240, 165, 0, 0.2);
            transform: scale(1.05);
        }

        .btn-this {
            color: #ff6b6b;
            border-color: #ff6b6b;
        }

        .btn-this:hover {
            background: rgba(255, 107, 107, 0.2);
            transform: scale(1.05);
        }

        .btn-next {
            color: rgba(255, 255, 255, 0.7);
            border-color: rgba(255, 255, 255, 0.3);
        }

        .btn-next:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }

        /* 導航按鈕 */
        .nav-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
        }

        .nav-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 2px solid rgba(240, 165, 0, 0.5);
            background: rgba(255, 255, 255, 0.05);
            color: #f0a500;
            font-size: 1.5em;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nav-btn:hover:not(:disabled) {
            background: rgba(240, 165, 0, 0.2);
            transform: scale(1.1);
            border-color: #f0a500;
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* 選擇畫面 */
        .selection-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
        }

        .selection-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid rgba(240, 165, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .selection-card:hover {
            transform: translateY(-5px);
            border-color: #f0a500;
            box-shadow: 0 10px 30px rgba(240, 165, 0, 0.3);
        }

        .selection-card img {
            max-width: 180px;
            margin: 15px auto;
            display: block;
        }

        .selection-card-title {
            font-size: 1.3em;
            color: #f0a500;
            font-weight: bold;
        }

        /* 結果畫面 */
        .result-panel {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 2px solid #f0a500;
            border-radius: 20px;
            padding: 40px;
        }

        .result-header {
            text-align: center;
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 2px solid rgba(240, 165, 0, 0.3);
        }

        .result-title {
            font-size: 2.5em;
            color: #f0a500;
            margin-bottom: 15px;
        }

        .result-dream {
            font-size: 1.1em;
            color: rgba(255, 255, 255, 0.7);
            line-height: 1.6;
            font-style: italic;
        }

        .result-image {
            max-width: 400px;
            margin: 30px auto;
            display: block;
        }

        .result-text {
            color: rgba(255, 255, 255, 0.9);
            line-height: 2;
            white-space: pre-wrap;
            font-size: 1.1em;
            padding: 20px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
        }

        .restart-button {
            width: 100%;
            padding: 15px;
            font-size: 1.2em;
            background: linear-gradient(135deg, #f0a500, #ff9500);
            border: none;
            border-radius: 15px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 30px;
        }

        .restart-button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 30px rgba(240, 165, 0, 0.5);
        }

        /* 空狀態提示 */
        .empty-message {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255, 255, 255, 0.6);
        }

        .empty-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        /* 響應式 */
        @media (max-width: 768px) {
            .nav-menu {
                display: none;
            }

            .page-title {
                font-size: 1.8em;
            }

            .input-panel,
            .result-panel {
                padding: 25px 20px;
            }

            .card-display {
                padding: 25px 20px;
            }

            .card-image {
                max-width: 250px;
            }

            .selection-grid {
                grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            }
        }
		
		/* 多選卡片右上角圈圈效果 */
		.selection-card {
			position: relative;
			transition: transform 0.2s;
		}
		.selection-card:hover {
			transform: translateY(-3px);
		}
		.select-circle {
			transition: all 0.2s;
		}
		/* 竹簡 hover 效果 */
		.bamboo-slip:hover {
			transform: translateY(-5px);
			box-shadow: 0 10px 20px rgba(0,0,0,0.4);
		}
    </style>
</head>
<body>
    <!-- 導航列 -->
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-brand">
                <span>☯️</span>
                <span>易經智慧</span>
            </a>
            <ul class="nav-menu">
                <li><a href="index.html">首頁</a></li>
                <li><a href="divination.html">占卜</a></li>
                <li><a href="lookup.html">查詢卦象</a></li>
                <li><a href="dream-interpretation.html" class="active">符號學解夢</a></li>
                <li><a href="blog.html">智慧分享</a></li>
            </ul>
        </div>
    </nav>

    <!-- 主容器 -->
    <div class="container">
        <!-- 畫面1: 輸入夢境 -->
        <div class="screen active" id="screen1">
            <div class="page-header">
                <h1 class="page-title">🌙 利用符號學解夢</h1>
                <p class="page-subtitle">
                    透過易經六十四卦的序卦順序，找出最符合您夢境的卦象符號，<br>
                    了解潛意識中的狀態與訊息
                </p>
            </div>

            <div class="input-panel">
                <label class="form-label">請簡述您的夢境</label>
                <textarea 
                    class="dream-input" 
                    id="dreamInput" 
                    placeholder="請描述您的夢境內容...&#10;例如：我夢見自己在一片廣闊的草原上奔跑，天空很藍，感覺很自由..."
                ></textarea>
                <button class="start-button" onclick="startViewing()">
                    🔮 開始尋找符號
                </button>
            </div>
        </div>

        <!-- 畫面2: 瀏覽卡片 -->
        <div class="screen" id="screen2">
            <div class="card-viewer">
				<!-- 固定在頂部的夢境顯示（不超過導航欄） -->
				<div style="background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); border-radius: 16px; padding: 12px 20px; margin-bottom: 20px; border-left: 4px solid #f0a500; position: sticky; top: 70px; z-index: 99;">
					<div style="color: #f0a500; font-size: 0.85rem; margin-bottom: 6px;">📜 您的夢境</div>
					<div id="screen2DreamText" style="color: white; line-height: 1.4; word-break: break-word;"></div>
				</div>
                <div class="progress-info">
                    <span id="progressText">第 1 卦 / 共 64 卦</span>
                </div>

                <div class="card-display">
                    <h2 class="card-title" id="cardTitle"></h2>
                    <img class="card-image" id="cardImage" alt="卦象圖">
                    
                    <div class="card-actions">
                        <button class="action-button btn-like" onclick="markAsLike()">
                            💛 我覺得這個像我
                        </button>
                        <button class="action-button btn-this" onclick="markAsThis()">
                            ✨ 就是這張！
                        </button>
                        <button class="action-button btn-next" onclick="nextCard()">
                            ➡️ 下一張
                        </button>
                    </div>
                </div>

                <div class="nav-buttons">
                    <button class="nav-btn" id="prevBtn" onclick="prevCard()">
                        ←
                    </button>
                    <button class="nav-btn" id="nextBtn" onclick="nextCard()">
                        →
                    </button>
                </div>
            </div>
        </div>

        <!-- 畫面3: 多選時的選擇畫面 -->
        <div class="screen" id="screen3">
            <div class="page-header">
                <h1 class="page-title">請從這些卦象中選擇一個</h1>
                <p class="page-subtitle">您標記了多個「像我」的卦象，請選擇最符合的一個</p>
            </div>

            <div class="selection-grid" id="selectionGrid"></div>

            <div style="text-align: center; margin-top: 30px;">
                <button class="restart-button" onclick="restartViewing()">
                    🔄 重新瀏覽所有卦象
                </button>
            </div>
        </div>

        <!-- 畫面4: 結果顯示 -->
        <div class="screen" id="screen4">
            <div class="result-panel">
                <div class="result-header">
                    <h2 class="result-title" id="resultTitle"></h2>
                    <p class="result-dream">
                        <strong>您的夢境：</strong><br>
                        <span id="resultDream"></span>
                    </p>
                </div>

                <img class="result-image" id="resultImage" alt="卦象圖">
                
                <div class="result-text" id="resultText"></div>

                <button class="restart-button" id="saveImageBtn" onclick="saveDreamResultAsImage()" style="background: linear-gradient(135deg, #667eea, #764ba2); margin-bottom: 15px;">
                    📷 保存結果為圖片
                </button>

                <button class="restart-button" onclick="resetAll()">
                    🌙 重新解夢
                </button>
            </div>
        </div>
		
		<!-- 畫面5: 竹簡串聯展示 -->
		<div class="screen" id="screen5">
			<div class="result-panel" style="padding: 30px;">
				<div id="bambooFixedDream" style="background:rgba(0,0,0,0.4); border-radius:16px; padding:15px; margin-bottom:25px; border-left:4px solid #f0a500;">
					<div style="color:#f0a500;">🌙 您的夢境</div>
					<div id="bambooDreamText" style="color:white; line-height:1.5;"></div>
				</div>
				<div style="color:#f0a500; margin-bottom:15px;">📜 您選擇的卦象・竹簡串聯</div>
				<div id="bambooScrollWrapper" style="overflow-x:auto; white-space:nowrap; padding-bottom:15px;"></div>
				<div id="bambooDetailPanel" style="margin-top:30px; background:rgba(0,0,0,0.3); border-radius:20px; padding:20px; min-height:200px;">
					<div style="color:rgba(255,255,200,0.7); text-align:center;">點擊任一竹簡，顯示該卦解讀</div>
				</div>
				<button class="restart-button" onclick="resetAll()" style="margin-top:30px;">🌙 重新解夢</button>
				<button class="restart-button" onclick="saveBambooResultAsImage()" style="margin-top:15px; background:linear-gradient(135deg, #667eea, #764ba2);">📷 保存結果為圖片</button>
			</div>
		</div>
    </div>

    <script>
        // 狀態管理
        let dreamState = {
            dreamText: '',
            currentIndex: 0,
            likedCards: [],
            finalCard: null,
            guaList: []
        };

        // 初始化卦象列表
        function initGuaList() {
            dreamState.guaList = Object.keys(YIJING_TEXT || {});
        }

        // 開始瀏覽
        function startViewing() {
            const dreamInput = document.getElementById('dreamInput');
            const dreamText = dreamInput.value.trim();

            if (!dreamText) {
                alert('請先描述您的夢境!');
                return;
            }

            dreamState.dreamText = dreamText;
            dreamState.currentIndex = 0;
            dreamState.likedCards = [];
            dreamState.finalCard = null;

			document.getElementById('screen2DreamText').innerText = dreamText;

            showScreen(2);
            displayCard();
        }

        // 顯示當前卡片
        function displayCard() {
            if (dreamState.currentIndex >= dreamState.guaList.length) {
                // 看完所有卡片
                finishViewing();
                return;
            }

            const guaName = dreamState.guaList[dreamState.currentIndex];
            const guaData = YIJING_TEXT[guaName];

            document.getElementById('cardTitle').textContent = guaName;
            document.getElementById('progressText').textContent = 
                `第 ${dreamState.currentIndex + 1} 卦 / 共 ${dreamState.guaList.length} 卦`;

            const cardImage = document.getElementById('cardImage');
            // 使用解夢專用圖片
            const dreamImage = DREAM_IMAGES[guaName];
            
            if (dreamImage) {
                cardImage.src = dreamImage;
                cardImage.style.display = 'block';
                cardImage.onerror = () => { 
                    console.error('圖片載入失敗:', dreamImage);
                    cardImage.style.display = 'none'; 
                };
            } else {
                cardImage.style.display = 'none';
            }

            // 更新導航按鈕狀態
            document.getElementById('prevBtn').disabled = dreamState.currentIndex === 0;
            document.getElementById('nextBtn').disabled = 
                dreamState.currentIndex === dreamState.guaList.length - 1;
        }

        // 標記為"像我"
        function markAsLike() {
            const guaName = dreamState.guaList[dreamState.currentIndex];
            if (!dreamState.likedCards.includes(guaName)) {
                dreamState.likedCards.push(guaName);
            }
            nextCard();
        }

        // 標記為"就是這張"
        function markAsThis() {
            const guaName = dreamState.guaList[dreamState.currentIndex];
            dreamState.finalCard = guaName;
            showResult(guaName);
        }

        // 下一張
        function nextCard() {
            dreamState.currentIndex++;
            
            // 檢查是否已經看完所有卡片
            if (dreamState.currentIndex >= dreamState.guaList.length) {
                finishViewing();
            } else {
                displayCard();
            }
        }

        // 上一張
        function prevCard() {
            if (dreamState.currentIndex > 0) {
                dreamState.currentIndex--;
                displayCard();
            }
        }

        // 完成瀏覽
        function finishViewing() {
            if (dreamState.likedCards.length === 0) {
                // 沒有選擇任何卡片
                if (confirm('您沒有選擇任何卦象。是否要重新開始瀏覽?')) {
                    restartViewing();
                } else {
                    resetAll();
                }
            } else if (dreamState.likedCards.length === 1) {
                // 只選了一張
                showResult(dreamState.likedCards[0]);
            } else {
                // 選了多張，顯示選擇畫面
                showSelectionScreen();
            }
        }

		// 顯示多選畫面（每個卡片右上角有圈圈，可複選，完成後跳轉竹簡）
		function showSelectionScreen() {
			const grid = document.getElementById('selectionGrid');
			grid.innerHTML = '';

			// 儲存每個卦的選中狀態與序號
			window.tempSelectedMap = new Map();  // key: 卦名, value: 序號
			let nextSeq = 1;

			// 顯示夢境文字在最上方（原問題）
			const headerDiv = document.querySelector('#screen3 .page-header');
			let dreamBar = document.getElementById('dreamBarForSelect');
			if (!dreamBar) {
				dreamBar = document.createElement('div');
				dreamBar.id = 'dreamBarForSelect';
				dreamBar.style.cssText = 'background:rgba(0,0,0,0.5); border-radius:16px; padding:12px 20px; margin-bottom:25px; border-left:4px solid #f0a500;';
				headerDiv.insertAdjacentElement('afterend', dreamBar);
			}
			dreamBar.innerHTML = `<div style="color:#f0a500; font-size:0.9rem;">📜 您的夢境</div><div style="color:white;">${dreamState.dreamText}</div>`;

			// 建立每個卦的卡片（含右上角圈圈）
			dreamState.likedCards.forEach(guaName => {
				const guaData = YIJING_TEXT[guaName];
				const dreamImage = DREAM_IMAGES[guaName];
				
				const card = document.createElement('div');
				card.className = 'selection-card';
				card.style.position = 'relative';
				card.style.cursor = 'pointer';
				
				// 右上角空心圈圈
				const badge = document.createElement('div');
				badge.className = 'select-circle';
				badge.textContent = '○';
				badge.style.cssText = 'position:absolute; top:10px; right:10px; width:32px; height:32px; border-radius:50%; background:rgba(0,0,0,0.6); border:2px solid #f0a500; color:#f0a500; display:flex; align-items:center; justify-content:center; font-weight:bold; font-size:1.2rem; z-index:2; transition:0.2s;';
				
				const innerContent = document.createElement('div');
				innerContent.innerHTML = `
					<div class="selection-card-title">${guaName}</div>
					${dreamImage ? `<img src="${dreamImage}" alt="${guaName}" onerror="this.style.display='none'" style="max-width:150px; margin-top:10px;">` : ''}
				`;
				card.appendChild(badge);
				card.appendChild(innerContent);
				
				// 點擊卡片時切換選中狀態（改變圈圈數字）
				card.onclick = (e) => {
					e.stopPropagation();
					if (window.tempSelectedMap.has(guaName)) {
						// 取消選中
						window.tempSelectedMap.delete(guaName);
						badge.textContent = '○';
						badge.style.background = 'rgba(0,0,0,0.6)';
						badge.style.color = '#f0a500';
						// 重新整理序號
						const entries = Array.from(window.tempSelectedMap.entries());
						entries.sort((a,b) => a[1] - b[1]);
						window.tempSelectedMap.clear();
						let newSeq = 1;
						for (let [g, _] of entries) {
							window.tempSelectedMap.set(g, newSeq++);
						}
						// 更新所有圈圈數字
						document.querySelectorAll('.selection-card').forEach(c => {
							const g = c.querySelector('.selection-card-title')?.innerText;
							const b = c.querySelector('.select-circle');
							if (g && window.tempSelectedMap.has(g)) {
								b.textContent = window.tempSelectedMap.get(g);
								b.style.background = '#2196f3';
								b.style.color = 'white';
							} else if (g) {
								b.textContent = '○';
								b.style.background = 'rgba(0,0,0,0.6)';
								b.style.color = '#f0a500';
							}
						});
					} else {
						// 選中
						window.tempSelectedMap.set(guaName, nextSeq);
						badge.textContent = nextSeq;
						badge.style.background = '#2196f3';
						badge.style.color = 'white';
						nextSeq++;
					}
				};
				
				grid.appendChild(card);
			});
			
			// 加入「完成選擇」按鈕
			let completeBtn = document.getElementById('completeMultiSelectBtn');
			if (!completeBtn) {
				completeBtn = document.createElement('button');
				completeBtn.id = 'completeMultiSelectBtn';
				completeBtn.className = 'restart-button';
				completeBtn.textContent = '✨ 完成選擇，檢視竹簡串聯 ✨';
				completeBtn.style.marginTop = '30px';
				document.querySelector('#screen3 .selection-grid').after(completeBtn);
			}
			completeBtn.onclick = () => {
				if (window.tempSelectedMap.size === 0) {
					alert('請至少選擇一個卦象（點擊卡片右上角圈圈）');
					return;
				}
				// 依序號排序
				const sorted = Array.from(window.tempSelectedMap.entries()).sort((a,b) => a[1] - b[1]);
				const selectedGuas = sorted.map(item => item[0]);
				jumpToBambooScreen(selectedGuas);
			};
			
			showScreen(3);
		}

        // 重新瀏覽
        function restartViewing() {
            dreamState.currentIndex = 0;
            dreamState.likedCards = [];
            dreamState.finalCard = null;
            showScreen(2);
            displayCard();
        }

        // 重置所有
        function resetAll() {
            dreamState = {
                dreamText: '',
                currentIndex: 0,
                likedCards: [],
                finalCard: null,
                guaList: dreamState.guaList
            };
            document.getElementById('dreamInput').value = '';

        // 顯示畫面
        function showScreen(screenNum) {
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById(`screen${screenNum}`).classList.add('active');
        }

        // ==================== 保存為圖片功能 ====================
        async function saveDreamResultAsImage() {
            const button = document.getElementById('saveImageBtn');
            
            if (!button) {
                alert('找不到按鈕元素');
                return;
            }
            
            const originalText = button.textContent;
            button.textContent = '📸 生成中...';
            button.disabled = true;

            try {
                // 檢查是否載入html2canvas
                if (typeof html2canvas === 'undefined') {
                    throw new Error('html2canvas 庫未載入,請檢查網路連線');
                }

                // 要截圖的區域
                const resultPanel = document.querySelector('#screen4 .result-panel');
                if (!resultPanel) {
                    throw new Error('找不到結果面板元素');
                }

                // 臨時隱藏按鈕
                button.style.visibility = 'hidden';
                const restartBtn = resultPanel.querySelector('.restart-button:last-child');
                const restartVisibility = restartBtn.style.visibility;
                restartBtn.style.visibility = 'hidden';

                // 等待圖片載入
                const images = resultPanel.querySelectorAll('img');
                console.log('等待圖片載入,共', images.length, '張');
                
                await Promise.all(Array.from(images).map(img => {
                    if (img.complete && img.naturalHeight !== 0) {
                        console.log('圖片已載入:', img.src);
                        return Promise.resolve();
                    }
                    return new Promise((resolve) => {
                        img.onload = () => {
                            console.log('圖片載入成功:', img.src);
                            resolve();
                        };
                        img.onerror = () => {
                            console.error('圖片載入失敗:', img.src);
                            resolve(); // 即使失敗也繼續
                        };
                        setTimeout(() => {
                            console.warn('圖片載入超時:', img.src);
                            resolve();
                        }, 5000);
                    });
                }));

                console.log('所有圖片已處理完成,開始生成canvas...');

                // 生成圖片 - 使用更寬鬆的設定
                const canvas = await html2canvas(resultPanel, {
                    backgroundColor: '#16213e',
                    scale: 1, // 降到1以避免記憶體問題
                    logging: true,
                    useCORS: true,
                    allowTaint: true,
                    foreignObjectRendering: false, // 禁用可能有問題的渲染方式
                    imageTimeout: 0, // 不要超時,因為我們已經手動等待了
                    removeContainer: true,
                    onclone: (clonedDoc) => {
                        // 在克隆的文件中確保圖片可見
                        const clonedImages = clonedDoc.querySelectorAll('img');
                        clonedImages.forEach(img => {
                            if (img.src) {
                                console.log('克隆文檔中的圖片:', img.src);
                            }
                        });
                    }
                });

                console.log('Canvas生成成功, 尺寸:', canvas.width, 'x', canvas.height);

                // 恢復按鈕顯示
                button.style.visibility = 'visible';
                restartBtn.style.visibility = restartVisibility;

                // 檢查canvas是否為空
                const ctx = canvas.getContext('2d');
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const pixels = imageData.data;
                let hasContent = false;
                
                for (let i = 0; i < pixels.length; i += 4) {
                    if (pixels[i] !== 0 || pixels[i+1] !== 0 || pixels[i+2] !== 0) {
                        hasContent = true;
                        break;
                    }
                }
                
                if (!hasContent) {
                    throw new Error('Canvas為空,可能圖片未正確載入');
                }

                // 轉換為圖片 - 使用JPEG格式避免toDataURL錯誤
                let imgData;
                try {
                    console.log('嘗試轉換為JPEG...');
                    imgData = canvas.toDataURL('image/jpeg', 0.92);
                    console.log('JPEG轉換成功, 數據大小:', imgData.length);
                } catch (e) {
                    console.error('JPEG轉換失敗:', e);
                    try {
                        console.log('嘗試轉換為PNG...');
                        imgData = canvas.toDataURL('image/png');
                        console.log('PNG轉換成功');
                    } catch (e2) {
                        console.error('PNG也失敗:', e2);
                        throw new Error('Canvas無法轉換為圖片,可能是圖片跨域問題。\n\n解決方法:\n1. 確保圖片路徑使用相對路徑 (images/gua01.PNG)\n2. 圖片與HTML在同一域名\n3. 使用截圖工具手動截圖');
                    }
                }

                // 檢查數據是否有效
                if (!imgData || imgData === 'data:,') {
                    throw new Error('圖片數據為空');
                }

                console.log('圖片數據生成成功');

                // 下載圖片
                const link = document.createElement('a');
                const timestamp = new Date().toISOString().slice(0,19).replace(/[:\-]/g, '');
                link.download = `易經解夢_${timestamp}.jpg`; // 改為jpg
                link.href = imgData;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);

                console.log('下載觸發成功');

                button.textContent = '✅ 保存成功!';
                setTimeout(() => {
                    button.textContent = originalText;
                    button.disabled = false;
                }, 2000);

            } catch (error) {
                console.error('保存失敗,詳細錯誤:', error);
                console.error('錯誤堆疊:', error.stack);
                
                button.style.visibility = 'visible';
                const restartBtn = document.querySelector('#screen4 .restart-button:last-child');
                if (restartBtn) restartBtn.style.visibility = 'visible';
                
                alert('保存圖片失敗:\n' + error.message + '\n\n可能原因:\n1. 圖片載入失敗\n2. 瀏覽器記憶體不足\n3. 圖片路徑錯誤\n\n請檢查瀏覽器控制台(F12)查看詳細錯誤');
                
                button.textContent = originalText;
                button.disabled = false;
            }
        }

        // 初始化
        initGuaList();
    </script>
